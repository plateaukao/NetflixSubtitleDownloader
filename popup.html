<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      background: #141414;
      color: #fff;
    }
    .header {
      background: #e50914;
      padding: 12px 16px;
      font-weight: bold;
      font-size: 14px;
    }
    .section {
      padding: 12px 16px;
      border-bottom: 1px solid #333;
    }
    .section:last-child { border-bottom: none; }
    label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      cursor: pointer;
    }
    label:hover { color: #e50914; }
    select, input[type="text"], input[type="number"] {
      background: #333;
      color: #fff;
      border: 1px solid #555;
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      width: 120px;
    }
    button {
      width: 100%;
      padding: 10px;
      background: #e50914;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 4px;
    }
    button:hover { background: #f6121d; }
    button:disabled { background: #555; cursor: default; }
    .status {
      padding: 8px 16px;
      font-size: 12px;
      color: #999;
      text-align: center;
    }
    .toggle {
      position: relative;
      width: 40px;
      height: 22px;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: #555;
      border-radius: 11px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .toggle .slider::before {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 3px;
      bottom: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .toggle input:checked + .slider { background: #e50914; }
    .toggle input:checked + .slider::before { transform: translateX(18px); }
  </style>
</head>
<body>
  <div class="header">Netflix Subtitle Downloader</div>

  <div class="section">
    <button id="btn-download">Download subs for this episode/movie</button>
    <button id="btn-season" style="margin-top:6px">Download for this season</button>
    <button id="btn-all" style="margin-top:6px">Download for all seasons</button>
  </div>

  <div class="section">
    <label>
      <span>Episode title in filename</span>
      <div class="toggle">
        <input type="checkbox" id="opt-ep-title">
        <span class="slider"></span>
      </div>
    </label>

    <label>
      <span>Force all languages</span>
      <div class="toggle">
        <input type="checkbox" id="opt-force-subs" checked>
        <span class="slider"></span>
      </div>
    </label>

    <label>
      <span>Preferred locale</span>
      <input type="text" id="opt-locale" placeholder="e.g. ja, ko, en">
    </label>

    <label>
      <span>Languages to download</span>
      <input type="text" id="opt-langs" placeholder="all (e.g. en,ja,ko)">
    </label>

    <label>
      <span>Prefer format</span>
      <select id="opt-format">
        <option value="webvtt-lssdh-ios8">WebVTT</option>
        <option value="dfxp-ls-sdh">DFXP/XML</option>
      </select>
    </label>

    <label>
      <span>Batch delay (seconds)</span>
      <input type="number" id="opt-delay" min="0" step="0.5" value="0" style="width:60px">
    </label>
  </div>

  <div class="status" id="status">Checking...</div>

  <script src="popup.js"></script>
</body>
</html>
